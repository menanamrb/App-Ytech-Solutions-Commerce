name: Deploy App

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Clean old files
        run: |
          cd /home/manalmrbt/Desktop/projets/App-Ytech-Solutions-Commerce
          rm -rf node_modules .next
          rm -f pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd /home/manalmrbt/Desktop/projets/App-Ytech-Solutions-Commerce
          npm install --legacy-peer-deps

      # تعديل next.config.js لتعطيل optimizeCss
      - name: Disable CSS optimization
        run: |
          cd /home/manalmrbt/Desktop/projets/App-Ytech-Solutions-Commerce
          # إنشاء next.config.js إذا لم يكن موجوداً
          if [ ! -f next.config.js ]; then
            echo "module.exports = { experimental: { optimizeCss: false } }" > next.config.js
          else
            # تعديل الملف الموجود (استخدم sed لإضافة السطر)
            sed -i '/optimizeCss/d' next.config.js
            sed -i '/experimental: {/a \    optimizeCss: false,' next.config.js
          fi

      - name: Build app
        run: |
          cd /home/manalmrbt/Desktop/projets/App-Ytech-Solutions-Commerce
          npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1  # تعطيل التليمتري

      - name: Restart app
        run: |
          cd /home/manalmrbt/Desktop/projets/App-Ytech-Solutions-Commerce
          pm2 restart app || pm2 start npm --name "app" -- start
